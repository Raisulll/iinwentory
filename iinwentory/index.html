<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/imperial-trends-logo.png" />
    <link rel="apple-touch-icon" href="/imperial-trends-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="iinwentory - Smart inventory management. Track items, folders, quantities, values, and generate QR codes for your products." />
    <meta name="theme-color" content="#3461CD" />
    <title>iinwentory — Inventory Management</title>

    <!-- Canonical + crawl directives for the public marketing landing page at /. -->
    <link rel="canonical" href="https://iinwentory.com/" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (Facebook / LinkedIn / Slack link previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="iinwentory" />
    <meta property="og:url" content="https://iinwentory.com/" />
    <meta property="og:title" content="iinwentory — Smart Inventory Management" />
    <meta property="og:description" content="Track items, folders, quantities, and values. Generate QR codes and manage your inventory from anywhere." />
    <meta property="og:image" content="https://iinwentory.com/imperial-trends-logo.png" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="iinwentory — Smart Inventory Management" />
    <meta name="twitter:description" content="Track items, folders, quantities, and values. Generate QR codes and manage your inventory from anywhere." />
    <meta name="twitter:image" content="https://iinwentory.com/imperial-trends-logo.png" />

    <!-- Preconnect to the API origin so the first auth/me + bootstrap
         requests don't pay the TLS handshake cost on top of cold start.
         NOTE: keep this host in sync with VITE_API_URL in .env. -->
    <link rel="preconnect" href="https://iinwentory-server.vercel.app" crossorigin />
    <link rel="dns-prefetch" href="https://iinwentory-server.vercel.app" />

    <!-- Inline pre-React paint so users see a coloured shell within ~50ms
         instead of a blank white screen until the JS bundle parses. -->
    <style>
      html, body { background: #F4F5F3; margin: 0; }
      html[data-theme="dark"], html[data-theme="dark"] body { background: #0A0F1F; }
      #root:empty::before {
        content: '';
        position: fixed; inset: 0;
        background: linear-gradient(180deg, rgba(54,81,220,0.04) 0%, transparent 38%);
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <script>
      // Apply persisted theme before React renders to avoid a flash of the wrong palette.
      // Also accepts ?theme=dark|light query for dev/testing without logging in.
      (function () {
        try {
          var qp = new URLSearchParams(location.search).get('theme');
          if (qp === 'dark' || qp === 'light') {
            document.documentElement.setAttribute('data-theme', qp);
            localStorage.setItem('iinwentory_theme', qp);
            return;
          }
          var t = localStorage.getItem('iinwentory_theme');
          if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        } catch (e) { /* ignore */ }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
